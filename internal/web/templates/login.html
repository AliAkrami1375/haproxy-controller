<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sign in &middot; {{.Brand.App}}</title>
<link rel="stylesheet" href="/static/app.css">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%232563eb'/%3E%3Ctext x='16' y='22' font-family='sans-serif' font-size='17' font-weight='bold' fill='white' text-anchor='middle'%3EH%3C/text%3E%3C/svg%3E">
</head>
<body class="login-page">
  <div class="login-card">
    <div class="login-brand">
      <div class="brand-mark"><svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 6h6M3 12h9M3 18h6"/><path d="M15 12h5M17.5 9.5 21 12l-3.5 2.5"/></svg></div>
      <h1>{{.Brand.App}}</h1>
      <p>{{.Brand.Tagline}}</p>
    </div>

    {{range .Flash}}
    <div class="flash {{.Kind}}">
      <span class="flash-icon">{{if eqi .Kind "error"}}<svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="10" cy="10" r="8"/><path d="M10 6v4.5M10 13.5h.01"/></svg>{{else}}<svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="10" cy="10" r="8"/><path d="M10 9v4.5M10 6.5h.01"/></svg>{{end}}</span>
      <div class="flash-body"><div class="flash-msg">{{.Message}}</div></div>
    </div>
    {{end}}

    <form method="post" action="/login">
      <input type="hidden" name="next" value="{{.Data.Next}}">
      <div class="field">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" value="{{.Data.Username}}"
               autocomplete="username" autofocus required>
      </div>
      <div class="field" style="margin-top:14px">
        <label for="password">Password</label>
        <input type="password" id="password" name="password"
               autocomplete="current-password" required>
      </div>
      <div style="margin-top:20px">
        <button type="submit" class="btn btn-primary btn-block btn-lg">Sign in</button>
      </div>
    </form>

    <div class="login-foot">
      Powered by <a href="{{.Brand.URL}}" target="_blank" rel="noopener noreferrer">{{.Brand.Name}}</a>
    </div>
  </div>
</body>
</html>
