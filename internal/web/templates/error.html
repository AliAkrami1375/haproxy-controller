<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{.Title}} &middot; {{.Brand.App}}</title>
<link rel="stylesheet" href="/static/app.css">
</head>
<body class="login-page">
  <div class="login-card" style="text-align:center">
    <div style="font-size:44px;font-weight:700;letter-spacing:-.02em">{{.Data.Status}}</div>
    <h1 style="font-size:17px;margin:8px 0 10px">{{.Title}}</h1>
    <p class="subtle" style="margin:0 0 22px">{{.Data.Message}}</p>
    <a href="/" class="btn btn-primary">Back to dashboard</a>
    <div class="login-foot">
      Powered by <a href="{{.Brand.URL}}" target="_blank" rel="noopener noreferrer">{{.Brand.Name}}</a>
    </div>
  </div>
</body>
</html>
